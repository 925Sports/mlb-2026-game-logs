name: Daily MLB 2026 Game Logs

on:
  schedule:
    - cron: '0 8 * * *'   # Runs every day at 8:00 AM UTC (3:00 AM CDT)
  workflow_dispatch:      # Allows you to run it manually anytime

jobs:
  update-logs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run MLB game logs script
        run: python mlb_2026_game_logs.py
      
      - name: Commit and push new CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.csv
          git commit -m "Daily update: MLB 2026 game logs - $(date)" || echo "No changes to commit"
          git push
